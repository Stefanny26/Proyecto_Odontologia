<form [formGroup]="formulario" (ngSubmit)="guardarOdontologo()" class="formulario">
  <mat-form-field appearance="fill">
    <mat-label>Nombre</mat-label>
    <input matInput formControlName="nombre" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Especialidad</mat-label>
    <input matInput formControlName="especialidad" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Teléfono</mat-label>
    <input matInput formControlName="telefono" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Email</mat-label>
    <input matInput formControlName="email" required type="email">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Fecha de Nacimiento</mat-label>
    <input matInput type="date" formControlName="fechaNacimiento" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Género</mat-label>
    <mat-select formControlName="genero" required>
      <mat-option value="Femenino">Femenino</mat-option>
      <mat-option value="Masculino">Masculino</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="botones">
    <button mat-raised-button color="primary" type="submit">
      {{ editando ? 'Actualizar' : 'Guardar' }}
    </button>
    <button mat-raised-button color="warn" type="button" (click)="cancelar()">Cancelar</button>
  </div>
</form>

<table mat-table [dataSource]="odontologos" class="mat-elevation-z8 tabla">

  <!-- Nombre -->
  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef> Nombre </th>
    <td mat-cell *matCellDef="let o"> {{ o.nombre }} </td>
  </ng-container>

  <!-- Especialidad -->
  <ng-container matColumnDef="especialidad">
    <th mat-header-cell *matHeaderCellDef> Especialidad </th>
    <td mat-cell *matCellDef="let o"> {{ o.especialidad }} </td>
  </ng-container>

  <!-- Teléfono -->
  <ng-container matColumnDef="telefono">
    <th mat-header-cell *matHeaderCellDef> Teléfono </th>
    <td mat-cell *matCellDef="let o"> {{ o.telefono }} </td>
  </ng-container>

  <!-- Email -->
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> Email </th>
    <td mat-cell *matCellDef="let o"> {{ o.email }} </td>
  </ng-container>

  <!-- Fecha de Nacimiento -->
  <ng-container matColumnDef="fechaNacimiento">
    <th mat-header-cell *matHeaderCellDef> Fecha Nac. </th>
    <td mat-cell *matCellDef="let o"> {{ o.fechaNacimiento | date }} </td>
  </ng-container>

  <!-- Género -->
  <ng-container matColumnDef="genero">
    <th mat-header-cell *matHeaderCellDef> Género </th>
    <td mat-cell *matCellDef="let o"> {{ o.genero }} </td>
  </ng-container>

  <!-- Acciones -->
  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef> Acciones </th>
    <td mat-cell *matCellDef="let o">
      <button mat-icon-button color="primary" (click)="editar(o)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="eliminar(o._id!)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnas"></tr>
  <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
</table>
