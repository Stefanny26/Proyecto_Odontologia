<div class="contenedor">
  <h2>Gestión de Pacientes</h2>

  <form [formGroup]="formulario" (ngSubmit)="guardarPaciente()" class="formulario">
    <mat-form-field appearance="fill" class="campo">
      <mat-label>Nombres</mat-label>
      <input matInput formControlName="nombres" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo">
      <mat-label>Fecha de Nacimiento</mat-label>
      <input matInput type="date" formControlName="fechaNacimiento" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo">
      <mat-label>Dirección</mat-label>
      <input matInput formControlName="direccion" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="telefono" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo">
      <mat-label>Correo</mat-label>
      <input matInput formControlName="correo" type="email" required>
    </mat-form-field>

    <div class="acciones">
      <button mat-raised-button color="primary" type="submit" class="btn-agregar">
        <mat-icon>add</mat-icon>
        {{ editando ? 'Actualizar' : 'Agregar' }} Paciente
      </button>
      <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    </div>
  </form>

  <h3>Pacientes Registrados</h3>

  <table mat-table [dataSource]="pacientes" class="mat-elevation-z8 tabla">

    <ng-container matColumnDef="nombres">
      <th mat-header-cell *matHeaderCellDef>Nombres</th>
      <td mat-cell *matCellDef="let p">{{ p.nombres }}</td>
    </ng-container>

    <ng-container matColumnDef="fechaNacimiento">
      <th mat-header-cell *matHeaderCellDef>Fecha Nac.</th>
      <td mat-cell *matCellDef="let p">{{ p.fechaNacimiento | date }}</td>
    </ng-container>

    <ng-container matColumnDef="telefono">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let p">{{ p.telefono }}</td>
    </ng-container>

    <ng-container matColumnDef="correo">
      <th mat-header-cell *matHeaderCellDef>Correo</th>
      <td mat-cell *matCellDef="let p">{{ p.correo }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let p">
        <button mat-button color="accent" (click)="editar(p)">Editar</button>
        <button mat-button color="warn" (click)="eliminar(p._id!)">Eliminar</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
</div>
